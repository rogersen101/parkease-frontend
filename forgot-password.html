<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ParkEase - Forgot Password</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Optional Custom CSS -->
<style>
body {
    background: #f5f7fa;
}

.reset-card {
    max-width: 400px;
    margin: 80px auto;
    border-radius: 10px;
}

.system-title {
    font-weight: bold;
}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-sm bg-primary navbar-dark">
<div class="container-fluid">

<a class="navbar-brand" href="#">
<img src="logo.png" alt="Logo" style="width:40px" class="rounded-circle">
</a>

<span class="navbar-text text-white fw-bold">ParkEase</span>

</div>
</nav>

<!-- Reset Password Card -->
<div class="card reset-card p-4 shadow">

<div class="text-center mb-3">
<h3 class="system-title">Forgot Password</h3>
<p class="text-muted">Enter your email to receive a reset link</p>
</div>

<form id="resetForm">

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="email" class="form-control" placeholder="Enter your email" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Send Reset Link
</button>

<!-- Back to Login -->
<div class="text-center mt-3">
<a href="login.html" class="text-decoration-none">← Back to Login</a>
</div>

</form>

<!-- Success Message -->
<div id="message" class="alert alert-success mt-3 d-none text-center">
Reset link sent! Check your email.
</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
