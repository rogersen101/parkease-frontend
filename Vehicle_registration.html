<!doctype html>
<html lang="en">
  <head>
    <title>Parking</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="logo.png"
            alt="Logo"
            style="width: 40px"
            class="rounded-circle"
          />
        </a>
        <div class="container-fluid">
          <span class="navbar-text text-white bold">ParkEase</span>
        </div>
      </div>
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Home</a>
          </li>          
          <li class="nav-item">
            <a class="nav-link active" href="tyre.html">Tyres</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="battery.html">Batteries</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="#">User</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
              <h4>Vehicle Registration Form</h4>
            </div>

            <div class="card-body">
              <form>
                <!-- Driver Name -->
                <div class="mb-3">
                  <label class="form-label">Driver Name</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter driver name"
                    required
                  />
                </div>

                <!-- Vehicle Type -->
                <div class="mb-3">
                  <label class="form-label">Vehicle Type</label>

                  <select class="form-select" required>
                    <option value="">Select Vehicle Type</option>
                    <option>Truck</option>
                    <option>Personal Car</option>
                    <option>Taxi</option>
                    <option>Coaster</option>
                    <option>Boda-boda</option>
                  </select>
                </div>

                <!-- Number Plate -->
                <div class="mb-3">
                  <label class="form-label">Number Plate</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter number plate"
                    required
                  />
                </div>

                <!-- Vehicle Model -->
                <div class="mb-3">
                  <label class="form-label">Vehicle Model</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter vehicle model"
                  />
                </div>

                <!-- Vehicle Color -->
                <div class="mb-3">
                  <label class="form-label">Vehicle Color</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter vehicle color"
                  />
                </div>

                <!-- Arrival Date -->
                <div class="mb-3">
                  <label class="form-label">Arrival Date</label>
                  <input type="date" class="form-control" required />
                </div>

                <!-- Arrival Time -->
                <div class="mb-3">
                  <label class="form-label">Arrival Time</label>
                  <input type="time" class="form-control" required />
                </div>

                <!-- Phone Number -->
                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="tel"
                    class="form-control"
                    placeholder="Enter phone number"
                    required
                  />
                </div>

                <!-- NIN Number -->
                <div class="mb-3">
                  <label class="form-label">NIN Number (For Boda-bodas)</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter NIN number"
                  />
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                  <button type="submit" class="btn btn-success">
                    Register Vehicle
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card text-center">
      <div class="card-footer text-white bg-primary">
        © 2026 ParkEase. All Rights Reserved
      </div>
    </div>
  </body>
</html>
