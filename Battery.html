<!doctype html>
<html lang="en">
  <head>
    <title>battery</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="battery.css" />
  </head>
  <body class="body">
    <!-- Nav bar -->
    <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="logo.png" class="logo" alt="Logo" />
        </a>
        <div class="container-fluid">
          <span class="navbar-text text-white bold">ParkEase</span>
        </div>
      </div>
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="administrator.html">Admin</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="tyre.html">Tyres</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="Battery.html">Batteries</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="login.html">Log Out</a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="main-content p-4">
      <div class="container-fluid">
        <h1 class="mt-4 text-center">Welcome to ParkEase</h1>
        <p class="text-muted text-center">Manage battery hiring and sales below.</p>
        <div class="row"></div>
        <!-- information -->
        <div class="container mt-5">
          <div class="row g-4">
            <!-- CARD 1 -->
            <div class="col-md-3">
              <div class="card shadow">
                <div class="card-header bg-primary text-white">
                  Battery Option
                </div>
                <div class="card-body">
                  <select class="form-select" id="batteryOption">
                    <option value="#">Select Option</option>
                    <option value="#">Hire Battery</option>
                    <option value="#">Buy Battery</option>
                  </select>
                </div>
              </div>
            </div>
            <!-- CARD 2 -->
            <div class="col-md-3">
              <div class="card shadow">
                <div class="card-header bg-success text-white">
                  Vehicle Type
                </div>
                <div class="card-body">
                  <select class="form-select" id="vehicleType">
                    <option value="0">Select Vehicle</option>
                    <option value="10000">Personal Car</option>
                    <option value="8000">Taxi</option>
                    <option value="6000">Bodaboda</option>
                    <option value="12000">Truck</option>
                    <option value="9000">Coaster</option>
                  </select>
                </div>
              </div>
            </div>
            <!-- CARD 3 -->
            <div class="col-md-3">
              <div class="card shadow">
                <div class="card-header bg-warning text-dark">Battery Size</div>
                <div class="card-body">
                  <select class="form-select" id="batterySize">
                    <option value="0">Select Battery Size</option>
                    <option value="80000">Small Battery</option>
                    <option value="120000">Medium Battery</option>
                    <option value="180000">Large Battery</option>
                  </select>
                  <br />
                  <input
                    type="number"
                    class="form-control"
                    id="hireFee"
                    placeholder="Enter hire fee"
                  />
                </div>
              </div>
            </div>
            <!-- CARD 4 -->
            <div class="col-md-3">
              <div class="card shadow">
                <div class="card-header bg-danger text-white">Total Amount</div>
                <div class="card-body text-center">
                  <h2 id="totalAmount">0 UGX</h2>
                  <button class="btn btn-dark mt-3" onclick="calculateTotal()">
                    Calculate Total
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                  <h4>Customer Details</h4>
                </div>
                <div class="card-body">
                  <form>
                    <div class="mb-3">
                      <label class="form-label">Customer Name</label>
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Enter customer name"
                      />
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Vehicle Number Plate</label>
                      <input
                        type="text"
                        class="form-control"
                        placeholder="Enter vehicle number"
                      />
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Phone Number</label>
                      <input
                        type="tel"
                        class="form-control"
                        placeholder="Enter phone number"
                      />
                    </div>
                    <div class="mb-3">
                      <label class="form-label">Final Amount</label>
                      <input
                        type="number"
                        class="form-control"
                        placeholder="Enter amount"
                      />
                    </div>
                    <div class="d-grid">
                      <button type="submit" class="btn btn-primary">
                        Submit
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card text-center">
        <div class="card-footer text-white bg-primary">
          © 2026 ParkEase. All Rights Reserved
        </div>
      </div>
    </div>
  </body>
</html>
