<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkEase Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">   
  </head>
  <body class="login-body">
     <nav class="navbar navbar-1 navbar-expand-sm bg-primary navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="logo.png"alt="Logo"style="width: 40px" class="rounded-circle"/></a>
       
        <div class="container-fluid">
          <span class="navbar-text text-white bold">ParkEase</span>
        </div>
      </div>
      <div class="container-fluid">
        <ul class="navbar-nav">

      </div>
    </nav>
    <div class="card login-card p-4">
      <div class="text-center mb-4">
        <h2 class="system-title">ParkEase</h2>
        <p class="text-muted">Parking Management System</p>
      </div>
      <form action="index.html">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" placeholder="Enter your email"  />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter password" />
        </div>
        <!-- forgot password link -->
        <div class="mb-3 text-end">
          <a href="forgot-password.html" class="text-primary">Forgot Password?</a>
        </div>
        <!-- sign in button -->
         <div class="d-grid">
          <button type="submit" class="btn btn-primary text-white">SIGN IN</button>
        </div>
      </form>
    </div>
    <!-- footer -->
     <div class="card text-center">
      <div class="card card-footer text-white bg-primary">
        © 2026 ParkEase. All Rights Reserved
      </div>
    </div>

  </body>
  </html>
