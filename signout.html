<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Vehicle Sign-Out </title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-sm bg-primary navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="logo.png"
            alt="Logo"
            style="width: 40px"
            class="rounded-circle"
          />
        </a>
        <div class="container-fluid">
          <span class="navbar-text text-white bold">ParkEase</span>
        </div>
      </div>
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Dashboard</a>
          </li>          
          <li class="nav-item">
            <a class="nav-link active" href="parking.html">Parking</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="tyre.html">Tyres</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="battery.html">Batteries</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="#">User</a>
          </li>
        </ul>
      </div>
    </nav>   
          
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
              <h4>Vehicle Sign-Out</h4>
            </div>

            <div class="card-body">
              <form>
                <!-- Receiver Name -->
                <div class="mb-3">
                  <label class="form-label">Receiver Name</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter receiver name"
                    required
                  />
                </div>

                <!-- Receipt Number -->
                <div class="mb-3">
                  <label class="form-label">Receipt Number</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter receipt number"
                    required
                  />
                </div>

                <!-- Date and Time -->
                <div class="mb-3">
                  <label class="form-label">Date and Time</label>
                  <input type="datetime-local" class="form-control" required />
                </div>

                <!-- Phone Number -->
                <div class="mb-3">
                  <label class="form-label">Phone Number</label>
                  <input
                    type="tel"
                    class="form-control"
                    placeholder="Enter phone number"
                    required
                  />
                </div>

                <!-- Gender -->
                <div class="mb-3">
                  <label class="form-label">Gender</label>

                  <select class="form-select" required>
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                  </select>
                </div>

                <!-- NIN Number -->
                <div class="mb-3">
                  <label class="form-label">NIN Number</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Enter National ID Number"
                    required
                  />
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                  <button type="submit" class="btn btn-warning">
                    Sign Out Vehicle
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
